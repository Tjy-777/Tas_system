<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>決済 - Tasシステム</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-checkout.css">
</head>
<body class="checkout-body">

    <header class="checkout-header">
        <button onclick="location.href='Tas.html'" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> 戻る
        </button>
        <h1 class="header-title">お支払い</h1>
        <div id="clerk-label-checkout">担当: ----</div>
    </header>

    <div class="checkout-container">
        <aside class="checkout-receipt-pane">
            <div class="receipt-header">選択中の商品</div>
            <div id="checkout-list" class="receipt-list"></div>
            <div class="checkout-total">
                <span class="total-label">合計：(税込み)</span>
                <span class="total-amount">¥<span id="checkout-total-val">0</span></span>
            </div>
        </aside>

        <main class="payment-methods-pane">
            <h2 class="section-title">お支払方法を選択してください</h2>
            <div class="payment-grid">
                <button class="pay-btn cash" onclick="startCashPayment()">
                    <i class="fa-solid fa-money-bill-1-wave"></i>
                    <span>現 金</span>
                </button>
                <button class="pay-btn barcode" onclick="finishPayment('バーコード決済')">
                    <i class="fa-solid fa-qrcode"></i>
                    <span>バーコード決済</span>
                </button>
                <button class="pay-btn credit" onclick="finishPayment('クレジットカード')">
                    <i class="fa-solid fa-credit-card"></i>
                    <span>クレジットカード</span>
                </button>
                <button class="pay-btn electronic" onclick="finishPayment('電子マネー')">
                    <i class="fa-solid fa-id-card"></i>
                    <span>電子マネー</span>
                </button>
            </div>
        </main>

        <main id="cash-payment-pane" class="payment-methods-pane hidden">
            <h2 class="section-title">現金お支払い</h2>
            
            <div class="cash-calc-container">
                <div class="cash-display-area">
                    <div class="input-line">
                        <span>お預かり額:</span>
                        <div class="cash-input-window"><span id="cash-input-val">0</span>円</div>
                    </div>
                    <div class="change-line">
                        <span>お釣り:</span>
                        <div class="change-window"><span id="change-val">0</span>円</div>
                    </div>
                </div>

                <div class="numpad">
                    <button class="num" onclick="pressNum('7')">7</button>
                    <button class="num" onclick="pressNum('8')">8</button>
                    <button class="num" onclick="pressNum('9')">9</button>
                    <button class="num" onclick="pressNum('4')">4</button>
                    <button class="num" onclick="pressNum('5')">5</button>
                    <button class="num" onclick="pressNum('6')">6</button>
                    <button class="num" onclick="pressNum('1')">1</button>
                    <button class="num" onclick="pressNum('2')">2</button>
                    <button class="num" onclick="pressNum('3')">3</button>
                    <button class="num" onclick="pressNum('0')">0</button>
                    <button class="num" onclick="pressNum('00')">00</button>
                    <button class="num del" onclick="pressClear()">消去</button>
                    <button class="num enter" onclick="calculateChange()">決定</button>
                </div>

                <div class="cash-footer-actions">
                    <button class="action-btn back" onclick="showMethods()">選択画面に戻る</button>
                    <button id="btn-finish-cash" class="action-btn finish disabled" onclick="finishCashPayment()" disabled>完 了</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let checkoutCart = JSON.parse(sessionStorage.getItem('current_cart') || "[]");
        let cashInput = ""; // 入力された数値文字列
        let totalAmount = 0;

        // 担当者表示
        document.getElementById('clerk-label-checkout').textContent = `担当: ${localStorage.getItem('pos_clerk_id') || "----"}`;

        function updateCheckoutUI() {
            const list = document.getElementById('checkout-list');
            const totalDisp = document.getElementById('checkout-total-val');
            list.innerHTML = "";
            totalAmount = 0;

            checkoutCart.forEach((item, index) => {
                const sub = item.price * item.qty;
                totalAmount += sub;
                const row = document.createElement('div');
                row.className = 'receipt-item';
                row.innerHTML = `<div class="top"><span>${item.name}</span><span>¥${sub.toLocaleString()}</span></div>
                                 <div class="bottom"><span>@${item.price.toLocaleString()}</span><span>${item.qty}個</span></div>`;
                list.appendChild(row);
            });
            totalDisp.textContent = totalAmount.toLocaleString();
        }

        // 現金画面開始
        window.startCashPayment = () => {
            document.querySelector('.payment-methods-pane:not(#cash-payment-pane)').classList.add('hidden');
            document.getElementById('cash-payment-pane').classList.remove('hidden');
            pressClear();
        };

        window.showMethods = () => {
            document.getElementById('cash-payment-pane').classList.add('hidden');
            document.querySelector('.payment-methods-pane:not(#cash-payment-pane)').classList.remove('hidden');
        };

        // テンキー操作
        window.pressNum = (num) => {
            if (cashInput.length < 10) {
                cashInput += num;
                document.getElementById('cash-input-val').textContent = Number(cashInput).toLocaleString();
            }
        };

        window.pressClear = () => {
            cashInput = "";
            document.getElementById('cash-input-val').textContent = "0";
            document.getElementById('change-val').textContent = "0";
            document.getElementById('btn-finish-cash').classList.add('disabled');
            document.getElementById('btn-finish-cash').disabled = true;
        };

        // お釣り計算
        window.calculateChange = () => {
            const paid = Number(cashInput);
            const change = paid - totalAmount;
            const changeDisp = document.getElementById('change-val');
            const finishBtn = document.getElementById('btn-finish-cash');

            changeDisp.textContent = change.toLocaleString();

            if (change >= 0) {
                changeDisp.style.color = "#000";
                finishBtn.classList.remove('disabled');
                finishBtn.disabled = false;
            } else {
                changeDisp.style.color = "red"; // 足りない場合は赤字
                finishBtn.classList.add('disabled');
                finishBtn.disabled = true;
            }
        };

        window.finishCashPayment = () => {
            const change = Number(cashInput) - totalAmount;
            alert(`お会計完了\nお預かり: ${Number(cashInput).toLocaleString()}円\nお釣り: ${change.toLocaleString()}円`);
            sessionStorage.removeItem('current_cart');
            location.href = 'Tas.html';
        };

        window.finishPayment = (method) => {
            alert(`${method}でお会計が完了しました。`);
            sessionStorage.removeItem('current_cart');
            location.href = 'Tas.html';
        };

        updateCheckoutUI();
    </script>
</body>
</html>
