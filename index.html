<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasシステム - ログイン</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="screen">
        <div class="login-card">
            <div class="login-header">
                <h1 class="brand-title">Tas SYSTEM</h1>
                <p class="brand-subtitle">レジ・担当者登録</p>
            </div>
            
            <div class="login-body">
                <p class="login-instruction">
                    社員証のバーコードを読み取るか、<br>
                    社員番号とパスワードを入力してください
                </p>
                
                <div class="input-group">
                    <input type="text" id="emp-id" class="flat-input" placeholder="社員番号" inputmode="email">
                </div>
                <div class="input-group">
                    <input type="password" id="emp-pass" placeholder="パスワード">
                </div>
                
                <button id="btn-login" class="btn-primary">ログイン</button>
            </div>
        </div>
    </div>

    <script>
        const btnLogin = document.getElementById('btn-login');
        const empIdInput = document.getElementById('emp-id');

        // ログイン処理
        const login = () => {
            const id = empIdInput.value || "12345";
            // 担当者IDをブラウザに保存
            localStorage.setItem('pos_clerk_id', id);
            // レジ画面へ遷移
            window.location.href = 'pos.html';
        };

        btnLogin.addEventListener('click', login);

        // Enterキーでログイン
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                login();
            }
        });

        // 全角数字を半角に変換する簡易処理（元のロジックを継承）
        empIdInput.addEventListener('blur', () => {
            let val = empIdInput.value;
            val = val.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
            empIdInput.value = val.replace(/[^a-zA-Z0-9]/g, '');
        });
    </script>
</body>
</html>
