<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>決済 - Tasシステム</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style-checkout.css">
</head>
<body class="checkout-body">

    <header class="checkout-header">
        <button onclick="location.href='Tas.html'" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> 戻る
        </button>
        <h1 class="header-title">お支払い</h1>
        <div id="clerk-label-checkout">担当: ----</div>
    </header>

    <div class="checkout-container">
        <aside class="checkout-receipt-pane">
            <div class="receipt-header">選択中の商品</div>
            <div id="checkout-list" class="receipt-list"></div>
            <div class="checkout-total">
                <span class="total-label">合計：(税込み)</span>
                <span class="total-amount">¥<span id="checkout-total-val">0</span></span>
            </div>
        </aside>

        <main class="payment-methods-pane">
            <h2 class="section-title">お支払方法を選択してください</h2>
            <div class="payment-grid">
                <button class="pay-btn cash" onclick="startCashPayment()">
                    <i class="fa-solid fa-money-bill-1-wave"></i>
                    <span>現 金</span>
                </button>
                <button class="pay-btn barcode" onclick="finishPayment('バーコード決済')">
                    <i class="fa-solid fa-qrcode"></i>
                    <span>バーコード決済</span>
                </button>
                <button class="pay-btn credit" onclick="finishPayment('クレジットカード')">
                    <i class="fa-solid fa-credit-card"></i>
                    <span>クレジットカード</span>
                </button>
                <button class="pay-btn electronic" onclick="finishPayment('電子マネー')">
                    <i class="fa-solid fa-id-card"></i>
                    <span>電子マネー</span>
                </button>
            </div>
        </main>

        <main id="cash-payment-pane" class="payment-methods-pane hidden">
            <h2 class="section-title">現金お支払い</h2>
            
            <div class="cash-calc-container">
                <div class="cash-display-area">
                    <div class="input-line">
                        <span>お預かり額:</span>
                        <div class="cash-input-window"><span id="cash-input-val">0</span>円</div>
                    </div>
                    <div class="change-line">
                        <span>お釣り:</span>
                        <div class="change-window"><span id="change-val">0</span>円</div>
                    </div>
                </div>

                <div class="numpad">
                    <button type="button" class="num" onclick="pressNum('7')">7</button>
                    <button type="button" class="num" onclick="pressNum('8')">8</button>
                    <button type="button" class="num" onclick="pressNum('9')">9</button>
                    <button type="button" class="num" onclick="pressNum('4')">4</button>
                    <button type="button" class="num" onclick="pressNum('5')">5</button>
                    <button type="button" class="num" onclick="pressNum('6')">6</button>
                    <button type="button" class="num" onclick="pressNum('1')">1</button>
                    <button type="button" class="num" onclick="pressNum('2')">2</button>
                    <button type="button" class="num" onclick="pressNum('3')">3</button>
                    <button type="button" class="num" onclick="pressNum('0')">0</button>
                    <button type="button" class="num" onclick="pressNum('00')">00</button>
                    <button type="button" class="num del" onclick="pressClear()">消去</button>
                </div>

                <div class="cash-footer-actions">
                    <button type="button"class="action-btn back" onclick="showMethods()">選択画面に戻る</button>
                    <button type="button" id="btn-finish-cash" class="action-btn finish disabled" onclick="finishCashPayment()" disabled>完 了</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/checkout.js"></script>
</body>
</html>
